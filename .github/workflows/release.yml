name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v1.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag }}

jobs:
  validate:
    name: Validate Branch
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release só pode ser executado a partir da branch main (atual: ${{ github.ref }})."
          exit 1

  # macOS — universal binary (arm64 + x86_64) compilado no runner arm64
  build-macos:
    name: Build macOS (Universal)
    needs: validate
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-universal-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: Open Note ${{ github.event.inputs.tag }}
          releaseDraft: true
          prerelease: ${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'rc') }}
          args: --target universal-apple-darwin --bundles app,dmg

      - name: Upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/**
          retention-days: 7
          if-no-files-found: warn

  # Linux — x86_64 nativo
  build-linux:
    name: Build Linux (x86_64)
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: Open Note ${{ github.event.inputs.tag }}
          releaseDraft: true
          prerelease: ${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'rc') }}
          args: --bundles appimage,deb

      - name: Upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-x86_64
          path: src-tauri/target/release/bundle/**
          retention-days: 7
          if-no-files-found: warn

  # Windows — x86_64 nativo
  build-windows:
    name: Build Windows (x86_64)
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x64-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: Open Note ${{ github.event.inputs.tag }}
          releaseDraft: true
          prerelease: ${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'rc') }}
          args: --bundles nsis,msi

      - name: Upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-x86_64
          path: src-tauri/target/release/bundle/**
          retention-days: 7
          if-no-files-found: warn

  # Publica o draft assim que todos os builds passarem
  publish-release:
    name: Publish Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release edit "$TAG" --draft=false
